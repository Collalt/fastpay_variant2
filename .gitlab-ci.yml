stages:
  - test

integration_tests:
  stage: test
  image: python:3.11-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
  script:
    - mkdir -p docs
    - python -m tests.demo_checklist | tee docs/test-log.txt
    - python -m pytest -vv -s --tb=short | tee -a docs/test-log.txt
  artifacts:
    when: always
    paths:
      - docs/test-log.txt
